name: Sync Fork

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时同步一次
  workflow_dispatch:        # 支持手动点按钮执行

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync upstream
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git remote add upstream https://github.com/MrOops1985/Clash-Rules.git
          git fetch upstream

          git checkout main
          git merge upstream/main --allow-unrelated-histories

          git push origin main
